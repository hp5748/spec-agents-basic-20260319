# MCP 服务器配置
# Model Context Protocol Server Configuration
#
# 配置优先级：
# 1. config/mcp.yaml (项目自定义，最高优先级)
# 2. .claude/mcp.json (Claude Code 标准)
# 3. ~/.claude.json (用户级配置)

# 全局配置
global:
  # 默认请求超时时间（秒）
  default_timeout: 30
  # 是否自动重连
  auto_reconnect: true
  # 最大重试次数
  max_retries: 3

# MCP 服务器列表
mcp_servers:
  # ==========================================
  # Filesystem MCP - 文件系统操作
  # ==========================================
  filesystem:
    # 是否启用
    enabled: false  # 默认禁用，请根据需要开启

    # 传输方式: stdio / http / sse
    transport: stdio

    # STDIO 传输配置
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      # 允许访问的路径（请根据实际情况修改）
      - "C:/projects/agents/spec-agents-basic-20260319"

    # 环境变量（可选）
    env: {}

  # ==========================================
  # Fetch MCP - HTTP 请求工具
  # ==========================================
  fetch:
    enabled: false  # 默认禁用，请根据需要开启

    transport: stdio

    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-fetch"

    env: {}

  # ==========================================
  # GitHub MCP - GitHub 操作
  # ==========================================
  github:
    enabled: false  # 默认禁用，需要配置 GITHUB_TOKEN

    transport: stdio

    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-github"

    # 环境变量
    env:
      # GitHub 令牌（从环境变量读取）
      GITHUB_TOKEN: "$GITHUB_TOKEN"

  # ==========================================
  # Brave Search MCP - 网页搜索
  # ==========================================
  brave-search:
    enabled: false  # 默认禁用，需要配置 BRAVE_API_KEY

    transport: stdio

    command: uvx
    args:
      - "--no-cache"
      - "mcp-brave-search"

    env:
      # Brave API 密钥
      BRAVE_API_KEY: "$BRAVE_API_KEY"

  # ==========================================
  # SQLite MCP - 数据库操作
  # ==========================================
  sqlite:
    enabled: true

    transport: stdio

    command: uvx
    args:
      - "--no-cache"
      - "mcp-server-sqlite"
      - "--db-path"
      - "data/users.db"

    env: {}

  # ==========================================
  # Memory MCP - 内存管理
  # ==========================================
  memory:
    enabled: false

    transport: stdio

    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-memory"

    env: {}
