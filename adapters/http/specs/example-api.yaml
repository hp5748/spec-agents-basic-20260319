openapi: 3.0.3
info:
  title: Example API
  description: 示例 API 规范，用于测试 HTTP 适配器
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: https://api.example.com/v1
    description: 生产环境
  - url: https://api-staging.example.com/v1
    description: 测试环境

security:
  - bearerAuth: []

paths:
  /users:
    get:
      operationId: listUsers
      summary: 获取用户列表
      description: 返回系统中的用户列表，支持分页和过滤
      tags:
        - Users
      parameters:
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: 每页数量
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          description: 用户状态过滤
          schema:
            type: string
            enum: [active, inactive, all]
            default: active
      responses:
        '200':
          description: 成功返回用户列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          description: 未授权
        '500':
          description: 服务器错误

    post:
      operationId: createUser
      summary: 创建用户
      description: 创建一个新用户
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 用户创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 请求参数错误
        '401':
          description: 未授权
        '409':
          description: 用户已存在

  /users/{userId}:
    get:
      operationId: getUser
      summary: 获取用户详情
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          description: 用户ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功返回用户详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: 用户不存在

    put:
      operationId: updateUser
      summary: 更新用户
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: 用户不存在

    delete:
      operationId: deleteUser
      summary: 删除用户
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 删除成功
        '404':
          description: 用户不存在

  /orders:
    get:
      operationId: listOrders
      summary: 获取订单列表
      tags:
        - Orders
      parameters:
        - name: userId
          in: query
          description: 按用户过滤
          schema:
            type: string
        - name: status
          in: query
          description: 订单状态
          schema:
            type: string
            enum: [pending, paid, shipped, delivered, cancelled]
      responses:
        '200':
          description: 成功返回订单列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'

  /orders/{orderId}:
    get:
      operationId: getOrder
      summary: 获取订单详情
      tags:
        - Orders
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9]{8}$'
          example: "12345678"
      responses:
        '200':
          description: 成功返回订单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: 订单不存在

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token 认证

    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API Key 认证

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, inactive]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object
      required:
        - username
        - email
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, inactive]

    Order:
      type: object
      properties:
        orderId:
          type: string
          pattern: '^[0-9]{8}$'
        userId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, paid, shipped, delivered, cancelled]
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        totalAmount:
          type: number
          format: float
        createdAt:
          type: string
          format: date-time

    OrderItem:
      type: object
      properties:
        productId:
          type: string
        productName:
          type: string
        quantity:
          type: integer
        price:
          type: number
          format: float

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
